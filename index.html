<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matrix Generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Matrix Generator</h1>

        <div class="input-card">
            <div class="field">
                <label for="row-input">Row Sums</label>
                <input type="text" id="row-input" value="0, 3, 2, 0, 1">
            </div>

            <div class="field">
                <label for="col-input">Column Sums</label>
                <input type="text" id="col-input" value="1, 1, 1, 2, 1">
            </div>

            <div class="checkbox-field">
                <input type="checkbox" id="fix-option">
                <label for="fix-option">Fix matrix if invalid?</label>
            </div>

            <button id="generate_button">Generate Matrix</button>
        </div>

        <div id="error-output"></div>
        <div id="fix-report"></div>
        <div id="matrix-container"></div>
        
        <div id="cy"></div>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
