name: Deploy WASM App

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --target web

      - name: Prepare Deployment Folder
        run: |
          # 1. Create a clean folder for the live website
          mkdir dist
          
          # 2. Copy your HTML, CSS, JS, and the compiled WASM folder into it
          cp index.html style.css app.js dist/
          cp -r pkg dist/
          
          # 3. Add the bypass file so GitHub Pages doesn't ignore the WASM
          touch dist/.nojekyll
          
          # 4. Remove the internal gitignore from the pkg folder just to be safe
          rm -f dist/pkg/.gitignore

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  # <-- Changed this to only deploy the clean folder
          publish_branch: gh-pages